<!DOCTYPE html><html lang='en'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>A Calculator App</title><link rel='preconnect' href='https://fonts.googleapis.com'><link rel='preconnect' href='https://fonts.gstatic.com' crossorigin><link href='https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap' rel='stylesheet'><style>* {margin: 0; padding: 0; box-sizing: border-box} body {font-family: 'Inter', sans-serif; background-color: #0a0a14; color: #e8e4ff} ::-webkit-scrollbar {width: 6px} ::-webkit-scrollbar-track {background: #111120} ::-webkit-scrollbar-thumb {background: #6366f1} .container {max-width: 400px; margin: 40px auto; padding: 20px; background-color: #111120; border: 1px solid rgba(255, 255, 255, 0.06); border-radius: 16px; box-shadow: 0 0 10px rgba(0, 0, 0, 0.2)} .input-field {width: 100%; padding: 12px; background-color: #111120; border: 1px solid rgba(99, 102, 241, 0.2); border-radius: 12px; font-size: 16px; font-weight: 500; color: #e8e4ff} .input-field:focus {border: 1px solid #6366f1; box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1)} .button {padding: 12px 24px; background: linear-gradient(135deg, #6366f1, #8b5cf6); color: #fff; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer} .button:hover {transform: translateY(-1px); box-shadow: 0 0 10px rgba(0, 0, 0, 0.2)} .button:active {transform: translateY(1px); box-shadow: 0 0 10px rgba(0, 0, 0, 0.1)} .footer {position: fixed; bottom: 0; left: 0; right: 0; padding: 10px; background-color: #0a0a14; text-align: center; font-size: 11px; color: #4b5563} .footer span {font-size: 11px; color: #4b5563}</style></head><body><div class='container'><input type='text' id='display' class='input-field' disabled><div class='buttons'><button class='button' onclick='clearDisplay()'>C</button><button class='button' onclick='backspace()'><svg width='20' height='20' viewBox='0 0 20 20' fill='none' stroke='currentColor' stroke-width='2'><line x1='10' y1='4' x2='10' y2='16'/><line x1='4' y1='10' x2='16' y2='10'/></svg></button><button class='button' onclick='updateDisplay(7)'>7</button><button class='button' onclick='updateDisplay(8)'>8</button><button class='button' onclick='updateDisplay(9)'>9</button><button class='button' onclick='updateDisplay('/')'>/</button><button class='button' onclick='updateDisplay(4)'>4</button><button class='button' onclick='updateDisplay(5)'>5</button><button class='button' onclick='updateDisplay(6)'>6</button><button class='button' onclick='updateDisplay(*)'>*</button><button class='button' onclick='updateDisplay(1)'>1</button><button class='button' onclick='updateDisplay(2)'>2</button><button class='button' onclick='updateDisplay(3)'>3</button><button class='button' onclick='updateDisplay(-)'>-</button><button class='button' onclick='updateDisplay(0)'>0</button><button class='button' onclick='updateDisplay(.)'>.</button><button class='button' onclick='updateDisplay(+)'>+</button><button class='button' onclick='calculate()'>=</button></div></div><div class='footer'>Built with Tinku AI <span>&#10024;</span></div><script>let display = document.getElementById('display'); let currentNumber = ''; let previousNumber = ''; let operator = ''; function updateDisplay(value) {if (value === '+' || value === '-' || value === '*' || value === '/') {previousNumber = currentNumber; currentNumber = ''; operator = value; display.value = previousNumber + ' ' + operator;} else {currentNumber += value; display.value = currentNumber;}} function clearDisplay() {currentNumber = ''; previousNumber = ''; operator = ''; display.value = '';} function backspace() {currentNumber = currentNumber.slice(0, -1); display.value = currentNumber;} function calculate() {let result; switch (operator) {case '+': result = parseFloat(previousNumber) + parseFloat(currentNumber); break; case '-': result = parseFloat(previousNumber) - parseFloat(currentNumber); break; case '*': result = parseFloat(previousNumber) * parseFloat(currentNumber); break; case '/': result = parseFloat(previousNumber) / parseFloat(currentNumber); break; default: return;} display.value = result.toString(); currentNumber = result.toString(); previousNumber = ''; operator = '';}</script></body></html>
